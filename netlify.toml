[build]
  # Build command - explicitly install dependencies first
  command = "npm ci --legacy-peer-deps || npm install --legacy-peer-deps && npm run build"
  
  # Publish directory
  publish = "dist"
  
  # Environment variables
  [build.environment]
    NODE_VERSION = "22"

# Redirect rules for SPA routing - This must come BEFORE any other redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Headers for static assets - aggressive caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers for JS/CSS files with hash
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Headers for index.html - no cache
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# General security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"